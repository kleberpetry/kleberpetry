name: Generate Animations

on:
  schedule:
    - cron: "0 */12 * * *" # Roda a cada 12 horas
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      # 1. Checkout com a versão mais recente (Node 24 compatível)
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Gera a Snake (Salva na pasta dist)
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake.gif

      # 3. Gera o Pac-Man (Salva na raiz por padrão para evitar EACCES)
      - name: Generate Pac-Man
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      # 4. Organiza os arquivos manualmente para garantir permissões
      - name: Organize files
        run: |
          mkdir -p dist
          # Copia os arquivos do Pacman para a pasta dist se eles existirem
          [ -f pacman-contribution-graph.svg ] && cp pacman-contribution-graph.svg dist/
          [ -f pacman-contribution-graph-dark.svg ] && cp pacman-contribution-graph-dark.svg dist/
          echo "Arquivos organizados na pasta dist:"
          ls -R dist

      # 5. Publica na branch 'output' usando a versão estável
      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}