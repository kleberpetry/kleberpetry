name: Generate Animations

on:
  schedule:
    - cron: "0 */12 * * *" # Roda a cada 12 horas
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      # 1. Checkout do repositório (necessário para organizar pastas)
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Gera a Snake
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake.gif

      # 3. Gera o Pac-Man
      - name: Generate Pac-Man
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      # 4. Move o arquivo do Pac-Man para a pasta dist (onde a snake está)
      - name: Move Pac-Man to dist
        run: |
          mkdir -p dist
          mv pacman-contribution-graph.svg dist/ 2>/dev/null || true
          mv pacman-contribution-graph-dark.svg dist/ 2>/dev/null || true

      # 5. Publica tudo de uma vez na branch output
      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}